name: Deploy Catalog

on:
  push:
    branches: [main]
    paths:
      - 'apps/catalog/**'
      - 'packages/**'
      - '.github/workflows/deploy-catalog.yml'

concurrency:
  group: deploy-catalog
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write  # required for OIDC

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build catalog
        run: pnpm turbo build --filter=...@hilum/catalog

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.CATALOG_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync assets to S3
        run: |
          aws s3 sync apps/catalog/dist s3://${{ secrets.CATALOG_BUCKET_NAME }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp apps/catalog/dist/index.html \
            s3://${{ secrets.CATALOG_BUCKET_NAME }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CATALOG_CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
